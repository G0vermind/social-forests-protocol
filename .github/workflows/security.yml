name: Security & Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 6 * * 1'

jobs:
  test:
    name: Contract Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2

      - name: Instalar Rust Stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32v1-none

      - name: Cache cargo registry
        uses: actions/cache@v4.2.2
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      # PASSO OBRIGATÓRIO: Gerar o WASM do Leaf Token para que o hero_journey possa compilar seus testes
      - name: Build Leaf Token (Dependency)
        run: cargo build --target wasm32v1-none --release --manifest-path contracts/leaf_token/Cargo.toml

      - name: Test rwa_vault
        run: cargo test --manifest-path contracts/rwa_vault/Cargo.toml -- --nocapture

      - name: Test sbt_reputation
        run: cargo test --manifest-path contracts/sbt_reputation/Cargo.toml -- --nocapture

      - name: Test hero_journey
        run: cargo test --manifest-path contracts/hero_journey/Cargo.toml -- --nocapture

  build:
    name: WASM Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2

      - name: Instalar Rust Stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32v1-none

      - name: Cache cargo registry
        uses: actions/cache@v4.2.2
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-wasm-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-wasm-

      # Build em ordem de dependência
      - name: Build Leaf Token (WASM)
        run: cargo build --target wasm32v1-none --release --manifest-path contracts/leaf_token/Cargo.toml

      - name: Build rwa_vault (WASM)
        run: cargo build --target wasm32v1-none --release --manifest-path contracts/rwa_vault/Cargo.toml

      - name: Build sbt_reputation (WASM)
        run: cargo build --target wasm32v1-none --release --manifest-path contracts/sbt_reputation/Cargo.toml

      - name: Build hero_journey (WASM)
        run: cargo build --target wasm32v1-none --release --manifest-path contracts/hero_journey/Cargo.toml

  audit:
    name: Rust CVE Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2
      - name: Instalar Rust Stable
        uses: dtolnay/rust-toolchain@stable
      - name: Install cargo-audit
        run: cargo install cargo-audit --quiet --locked
      - name: Audit dependencies
        run: cargo audit

  scout:
    name: Scout Security Audit
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4.2.2
      - name: Instalar Rust Stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32v1-none
      - name: Install Scout
        run: cargo install cargo-scout-audit --locked
      # Adicionando build prévio para o Scout não falhar na macro import!
      - name: Build Leaf Token for Scout
        run: cargo build --target wasm32v1-none --release --manifest-path contracts/leaf_token/Cargo.toml
      - name: Audit rwa_vault
        run: cargo scout-audit --manifest-path contracts/rwa_vault/Cargo.toml
      - name: Audit sbt_reputation
        run: cargo scout-audit --manifest-path contracts/sbt_reputation/Cargo.toml
      - name: Audit hero_journey
        run: cargo scout-audit --manifest-path contracts/hero_journey/Cargo.toml