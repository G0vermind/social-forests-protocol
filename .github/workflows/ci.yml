name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  contracts:
    name: Soroban Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2

      - name: Instalar Rust Stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32v1-none

      - name: Cache cargo registry
        uses: actions/cache@v4.2.2
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      # PASSO CRÍTICO: Compilar o Leaf Token primeiro para que o hero_journey possa importá-lo
      - name: Build Leaf Token WASM (Dependency)
        run: cargo build --target wasm32v1-none --release --manifest-path contracts/leaf_token/Cargo.toml

      - name: Build rwa_vault WASM
        run: cargo build --target wasm32v1-none --release --manifest-path contracts/rwa_vault/Cargo.toml

      - name: Build sbt_reputation WASM
        run: cargo build --target wasm32v1-none --release --manifest-path contracts/sbt_reputation/Cargo.toml

      # Agora o hero_journey encontrará o arquivo .wasm necessário
      - name: Build hero_journey WASM
        run: cargo build --target wasm32v1-none --release --manifest-path contracts/hero_journey/Cargo.toml

      # Testes após o build garantem que as macros de importação funcionem
      - name: Test rwa_vault
        run: cargo test --manifest-path contracts/rwa_vault/Cargo.toml -- --nocapture

      - name: Test sbt_reputation
        run: cargo test --manifest-path contracts/sbt_reputation/Cargo.toml -- --nocapture

      - name: Test hero_journey
        run: cargo test --manifest-path contracts/hero_journey/Cargo.toml -- --nocapture

  frontend:
    name: Next.js Build
    needs: contracts # Garante que o frontend só compile se os contratos passarem
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2
      
      - name: Setup Node.js
        uses: actions/setup-node@v4.4.0
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/web/package-lock.json
          
      - name: Install Dependencies
        run: cd apps/web && npm ci
        
      - name: Type Check (TypeScript)
        run: cd apps/web && npx tsc --noEmit
        
      - name: Build Web App
        run: cd apps/web && npm run build