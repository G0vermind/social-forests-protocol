<!doctype html>
<html lang="pt">
<head>
  <meta charset="utf-8"/>
  <title>Wireframes — Florestas.Social (print)</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@500;700&family=Kalam:wght@300;400;700&family=Patrick+Hand&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="styles.css"/>
  <style>
    @page { size: A3 landscape; margin: 10mm; }
    html, body {
      background: #fbf7f0 !important;
      -webkit-print-color-adjust: exact;
      print-color-adjust: exact;
    }
    body { background-image: none !important; }
    .page { break-after: page; padding: 24px 24px 60px; max-width: none; }
    .page:last-child { break-after: auto; }
    .artboards, .artboards.cols-1, .artboards.cols-2 {
      grid-template-columns: repeat(auto-fit, minmax(360px, 1fr)) !important;
    }
    .desktop, .phone, .box, .pkg, .modal, .kpi {
      break-inside: avoid;
    }
    .artboard { break-inside: avoid; }
    .persona-pane { padding: 24px 24px 40px; }
    .app-header { position: static !important; backdrop-filter: none; }
    /* hide nothing — show everything */
    @media print {
      .lang-switch, .persona-tabs { display: none !important; }
    }
    .lang-switch, .persona-tabs { display: none; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script src="i18n.js"></script>
  <script type="text/babel" src="primitives.jsx"></script>
  <script type="text/babel" src="screen-member.jsx"></script>
  <script type="text/babel" src="screen-brand.jsx"></script>
  <script type="text/babel" src="screen-ops.jsx"></script>
  <script type="text/babel" src="app-print.jsx"></script>
</body>
</html>
